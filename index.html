<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FA Segurança do Trabalho - Portal SST</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --verde-escuro: #1B4332; --verde-musgo: #40916C; --creme: #F8F7F4; --branco: #FFFFFF; }
        html, body { background-color: #064e3b !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; position: relative; min-height: 100vh; overflow-x: hidden; }
        .header-fa { background-color: var(--verde-escuro); }
        .card-fa { background-color: var(--branco); border: 1px solid #F3F4F6; backdrop-filter: blur(8px); }
        .logo-filtro-verde { filter: invert(53%) sepia(13%) saturate(1475%) hue-rotate(105deg) brightness(92%) contrast(85%); }
        .linhas-engenharia { background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
        @keyframes piscarAlerta { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .piscar-alerta { animation: piscarAlerta 1.5s infinite; }
    </style>
</head>
<body class="linhas-engenharia text-slate-800">

    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden select-none opacity-20">
        <i class="fa-solid fa-glasses absolute text-white text-3xl top-6 left-12 rotate-12"></i>
        <i class="fa-solid fa-ear-deaf absolute text-white text-3xl top-8 right-16 -rotate-12"></i>
        <i class="fa-solid fa-helmet-safety absolute text-white text-4xl top-6 left-1/3 opacity-50"></i>
        <i class="fa-solid fa-mitten absolute text-white text-3xl top-7 right-1/3"></i>
        <i class="fa-solid fa-boot-line absolute text-white text-3xl top-1/4 left-6 -rotate-45"></i>
        <i class="fa-solid fa-shield-halved absolute text-white text-3xl top-1/2 left-8 rotate-12"></i>
    </div>

    <div id="tela-login" class="fixed inset-0 bg-emerald-900/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full border-t-8 border-emerald-800 text-center relative z-10">
            <div class="flex items-center justify-center gap-4 mb-4 select-none">
                <i class="fa-solid fa-helmet-safety text-emerald-800/25 text-4xl -rotate-12"></i>
                <img src="Segurança no Trabalho.png" alt="FA Segurança" class="max-h-24 object-contain logo-filtro-verde">
                <i class="fa-solid fa-helmet-safety text-emerald-800/25 text-4xl rotate-12"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-1">Portal de Segurança e Auditoria</h2>
            <div class="flex bg-gray-100 p-1.5 rounded-xl mb-6">
                <button onclick="alternarAbaEntrada('empresa')" id="aba-empresa" class="w-1/2 py-2.5 text-sm font-bold rounded-lg bg-emerald-800 text-white shadow shadow-emerald-900">Acesso Empresa</button>
                <button onclick="alternarAbaEntrada('admin')" id="aba-admin" class="w-1/2 py-2.5 text-sm font-bold rounded-lg text-gray-500 hover:text-slate-800">Administrador</button>
            </div>
            <form id="form-login-empresa" onsubmit="processarLoginEmpresa(event)" class="space-y-4 text-left">
                <div><label class="block text-xs font-bold text-gray-600">CNPJ</label><input type="text" id="login-cnpj" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-sm"></div>
                <div><label class="block text-xs font-bold text-gray-600">Senha</label><input type="password" id="login-senha-empresa" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-sm"></div>
                <button type="submit" class="w-full bg-emerald-800 text-white p-3 rounded-xl font-bold">Entrar</button>
            </form>
            <form id="form-login-admin" onsubmit="processarLoginAdmin(event)" class="space-y-4 text-left hidden">
                <div><label class="block text-xs font-bold text-gray-600">Usuário</label><input type="text" id="login-usuario-admin" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-sm"></div>
                <div><label class="block text-xs font-bold text-gray-600">Senha</label><input type="password" id="login-senha-admin" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-sm"></div>
                <button type="submit" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold">Painel FA</button>
            </form>
        </div>
    </div>

    <header class="header-fa text-white p-4 shadow-lg flex flex-col sm:flex-row justify-between items-center gap-4 hidden relative z-10" id="main-header">
        <div class="flex items-center space-x-4">
            <img src="Segurança no Trabalho.png" alt="Logo" class="max-h-16 p-1 object-contain">
            <div><span class="text-xl font-bold tracking-wider block">FA SEGURANÇA DO TRABALHO</span><span class="text-xs text-emerald-300" id="subtitulo-painel"></span></div>
        </div>
        <button onclick="logout()" class="bg-red-700 text-white px-4 py-2 rounded-xl text-sm font-bold cursor-pointer">Sair</button>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 hidden relative z-10" id="main-content">
        <!-- SEÇÕES DE PAINEL AQUI... (Conteúdo de tabelas mantido) -->
        <section id="painel-prestador" class="space-y-6 hidden">
            <div id="banner-alerta-empresa" class="hidden"></div>
            <div class="card-fa p-6 rounded-2xl shadow-md border-t-4 border-slate-700">
                <h3 class="text-base font-bold text-emerald-900 mb-3"><i class="fa-solid fa-folder-closed"></i> Documentação Técnica</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="grid-docs-empresa-prestador"></div>
            </div>
            <div class="card-fa p-6 rounded-2xl shadow-md">
                <table class="w-full"><tbody id="tabela-retorno-empresa"></tbody></table>
            </div>
        </section>

        <section id="painel-admin" class="space-y-6 hidden">
            <div id="banner-alerta-admin" class="hidden"></div>
            <div id="sub-painel-empresas" class="card-fa p-6 rounded-2xl shadow-md"><table class="w-full"><tbody id="tabela-admin-empresas"></tbody></table></div>
        </section>
    </main>

    <div id="modal-colaborador" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full p-6 space-y-4 max-h-[90vh] overflow-y-auto border">
            <h3 class="font-bold text-slate-800" id="titulo-modal-colab">Dados do Trabalhador</h3>
            <form id="form-colaborador" onsubmit="enviarDadosNuvem(event)" class="space-y-4">
                <input type="hidden" id="edit-col-id">
                <div id="bloco-identificacao" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div><label class="text-xs font-bold">Nome</label><input type="text" id="col-nome" class="p-3 border rounded-xl w-full"></div>
                    <div><label class="text-xs font-bold">CPF</label><input type="text" id="col-cpf" class="p-3 border rounded-xl w-full"></div>
                    <div><label class="text-xs font-bold">Função</label><input type="text" id="col-funcao" class="p-3 border rounded-xl w-full"></div>
                </div>
                <div id="bloco-arquivos" class="space-y-3"></div>
                <button type="submit" class="w-full bg-emerald-800 text-white p-3 rounded-xl font-bold">Transmitir Documentação</button>
            </form>
        </div>
    </div>

    <script>
        // === LÓGICA DE SEGURANÇA (TRAVA DE APROVAÇÃO) ===
        
        async function transmitirDocCorporativoSupa(idDoc) {
            const urlFisica = await fazerUploadDeArquivo(`file-corp-${idDoc}`, idDoc);
            if(!urlFisica) { alert("Selecione um arquivo!"); return; }

            const paths = {};
            paths[`pdf_${idDoc}`] = urlFisica;
            // APLIQUEI A TRAVA: Sempre que a empresa envia, o status volta para "Pendente de análise"
            paths[`status_${idDoc}`] = 'Pendente de análise'; 
            paths[`obs_${idDoc}`] = 'Aguardando nova conferência da FA';

            const { error } = await _supabase.from('acessos_empresas').update(paths).eq('cnpj', empresaCnpjSessao);
            if(!error) {
                alert("Transmitido! Aguarde a nova avaliação da FA para liberação.");
                carregarRetornosDaEmpresa();
            }
        }

        async function enviarDadosNuvem(e) {
            e.preventDefault();
            const idExistente = document.getElementById('edit-col-id').value;
            const paths = {};
            let enviouAlgo = false;

            for (let d of listaDocsDefinidos) {
                const fileInput = document.getElementById(`file-${d.id}`);
                if(fileInput && fileInput.files && fileInput.files.length > 0) {
                    const urlFisica = await fazerUploadDeArquivo(`file-${d.id}`, d.id);
                    if(urlFisica) {
                        paths[`pdf_${d.id}`] = urlFisica;
                        // APLIQUEI A TRAVA: Força "Pendente de análise"
                        paths[`status_${d.id}`] = 'Pendente de análise';
                        paths[`obs_${d.id}`] = 'Aguardando nova conferência da FA';
                        enviouAlgo = true;
                    }
                }
            }

            if(idExistente && enviouAlgo) {
                await _supabase.from('colaboradores').update(paths).eq('id', idExistente);
                alert("✅ Documentação transmitida! Aguarde a nova análise da FA.");
                alternarModalColaboradorVisual(false);
                carregarRetornosDaEmpresa();
            }
        }

        // [MANTENHA O RESTANTE DAS SUAS FUNÇÕES ORIGINAIS AQUI...]
        // (logout, renderizarTabelaRetornoPrestador, carregarDadosPainelAdmin, etc.)
    </script>
</body>
</html>
