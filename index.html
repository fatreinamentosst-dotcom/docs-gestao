        // === LÓGICA DE BLOQUEIO DE EDIÇÃO (NOVA) ===
        function podeEditarDocumento(status, validade) {
            const perfil = localStorage.getItem('fa_perfil_logado');
            if (perfil === 'admin') return true; // ADM SEMPRE PODE

            const situacaoPrazo = avaliarVencimentoData(validade);
            // Empresa só edita se estiver Reprovado ou Vencido
            return (status === 'Reprovado' || situacaoPrazo === 'vencido');
        }

        // === UPLOAD COM HISTÓRICO (Preserva arquivos antigos) ===
        async function fazerUploadDeArquivo(idInput, pasta) {
            const input = document.getElementById(idInput);
            if (!input || !input.files || input.files.length === 0) return null;
            
            const file = input.files[0];
            const timestamp = Date.now(); // Garante nome único para histórico
            const cnpjEscopo = empresaCnpjSessao || escopoCnpjAdminAtual || 'default';
            const filePath = `${cnpjEscopo}/${pasta}_${timestamp}_${file.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;
            
            const { data, error } = await _supabase.storage.from('documentos').upload(filePath, file, { cacheControl: '3600', upsert: true });
            if (data) {
                const { data: urlData } = _supabase.storage.from('documentos').getPublicUrl(filePath);
                return urlData.publicUrl;
            }
            return null;
        }

        // === MODIFICAÇÃO NO CADASTRO/EDITAR (APLICA O BLOQUEIO) ===

                const fileInput = document.getElementById(`file-${d.id}`);
                
                if (fileInput) {
