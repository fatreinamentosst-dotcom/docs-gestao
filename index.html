<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FA Segurança do Trabalho - Portal SST</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --verde-escuro: #1B4332; --verde-musgo: #40916C; --creme: #F8F7F4; --branco: #FFFFFF; }
        html, body { background-color: #064e3b !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; position: relative; min-height: 100vh; overflow-x: hidden; }
        .header-fa { background-color: var(--verde-escuro); }
        .card-fa { background-color: var(--branco); border: 1px solid #F3F4F6; backdrop-filter: blur(8px); }
        .logo-filtro-verde { filter: invert(53%) sepia(13%) saturate(1475%) hue-rotate(105deg) brightness(92%) contrast(85%); }
        .linhas-engenharia { background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
        @keyframes piscarAlerta { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .piscar-alerta { animation: piscarAlerta 1.5s infinite; }
    </style>
</head>
<body class="linhas-engenharia text-slate-800">

    <div id="tela-login" class="fixed inset-0 bg-emerald-900/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full border-t-8 border-emerald-800 text-center relative z-10">
            <div class="flex items-center justify-center gap-4 mb-4 select-none">
                <i class="fa-solid fa-helmet-safety text-emerald-800/25 text-4xl -rotate-12"></i>
                <img src="Segurança no Trabalho.png" alt="FA Segurança" class="max-h-24 object-contain logo-filtro-verde">
                <i class="fa-solid fa-helmet-safety text-emerald-800/25 text-4xl rotate-12"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-1">Portal de Segurança e Auditoria</h2>
            <p class="text-xs text-gray-500 mb-6">Escolha o seu tipo de acesso para entrar na plataforma</p>
            
            <div class="flex bg-gray-100 p-1.5 rounded-xl mb-6">
                <button onclick="alternarAbaEntrada('empresa')" id="aba-empresa" class="w-1/2 py-2.5 text-sm font-bold rounded-lg bg-emerald-800 text-white shadow shadow-emerald-900 cursor-pointer">
                    <i class="fa-solid fa-building mr-1"></i> Acesso Empresa
                </button>
                <button onclick="alternarAbaEntrada('admin')" id="aba-admin" class="w-1/2 py-2.5 text-sm font-bold rounded-lg text-gray-500 hover:text-slate-800 cursor-pointer">
                    <i class="fa-solid fa-user-shield mr-1"></i> Administrador
                </button>
            </div>

            <form id="form-login-empresa" onsubmit="processarLoginEmpresa(event)" class="space-y-4 text-left">
                <div><label class="block text-xs font-bold text-gray-600 uppercase">CNPJ da Empresa</label><input type="text" id="login-cnpj" required placeholder="00.000.000/0001-00" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-sm outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-600 uppercase">Senha de Acesso</label><input type="password" id="login-senha-empresa" required placeholder="••••••" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-sm outline-none"></div>
                <button type="submit" class="w-full bg-emerald-800 text-white p-3 rounded-xl font-bold hover:bg-emerald-900 transition flex items-center justify-center gap-2 cursor-pointer">Entrar como Prestador</button>
            </form>

            <form id="form-login-admin" onsubmit="processarLoginAdmin(event)" class="space-y-4 text-left hidden">
                <div><label class="block text-xs font-bold text-gray-600 uppercase">Usuário Administrador</label><input type="text" id="login-usuario-admin" required placeholder="Ex: admin" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-sm outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-600 uppercase">Chave Master</label><input type="password" id="login-senha-admin" required placeholder="••••••" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-sm outline-none"></div>
                <button type="submit" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold hover:bg-slate-900 transition flex items-center justify-center gap-2 cursor-pointer">Painel Geral FA</button>
            </form>
        </div>
    </div>

    <script>
        // A CORREÇÃO ESTÁ AQUI:
        const listaDocsDefinidos = [
            { id: 'aso', nome: 'ASO (Atestado de Saúde)', obrigatorio: true, eNormativa: false },
            { id: 'ficha', nome: 'Ficha de Registro', obrigatorio: true, eNormativa: false },
            { id: 'os', nome: 'Ordem de Serviço (OS)', obrigatorio: true, eNormativa: false },
            { id: 'esocial', nome: 'e-Social / CTPS', obrigatorio: true, eNormativa: false },
            { id: 'nr11', nome: 'NR-11', obrigatorio: false, eNormativa: true },
            { id: 'nr12', nome: 'NR-12', obrigatorio: false, eNormativa: true },
            { id: 'nr18', nome: 'NR-18', obrigatorio: false, eNormativa: true },
            { id: 'nr33', nome: 'NR-33', obrigatorio: false, eNormativa: true },
            { id: 'nr35', nome: 'NR-35', obrigatorio: false, eNormativa: true },
            { id: 'nr5', nome: 'NR-05 (CIPA)', obrigatorio: false, eNormativa: true },
            { id: 'nr6', nome: 'NR-06 (EPI)', obrigatorio: false, eNormativa: true }
        ];
        
        // [COLE AQUI O RESTANTE DA LÓGICA DO SEU ARQUIVO ORIGINAL...]
    </script>
</body>
</html>
